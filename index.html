<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1ª Olimpíada de Operações J&T - Galeria de Fotos</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <main class="app-container bg-jt-gradient">
        
        <div class="decor-lights">
            <div class="light-top"></div>
            <div class="light-bottom"></div>
        </div>

        <header class="app-header">
            <div class="regional-badge">
                <i data-lucide="package" class="icon-sm"></i>
                <span>J&T Express • Regional Sul</span>
            </div>

            <div class="title-group">
                <i data-lucide="sparkles" class="sparkle-left"></i>
                <i data-lucide="trophy" class="icon-trophy trophy-glow"></i>
                
                <h1 class="main-title">
                    1ª Olimpíada <br/> 
                    <span class="gold-text gold-text-block">de Operações</span>
                </h1>
                
                <i data-lucide="trophy" class="icon-trophy trophy-glow"></i>
                <i data-lucide="sparkles" class="sparkle-right"></i>
            </div>
            
            <p class="header-subtitle">
                Apresentando os colaboradores classificados na <span class="highlight-fase">1ª fase</span>:
            </p>
        </header>

        <section id="grid-colaboradores" class="colab-grid">
            </section>

        <footer class="app-footer">
            <div class="btn-gold">
                <i data-lucide="award" class="icon-btn"></i>
                Competindo com excelência
                <i data-lucide="award" class="icon-btn"></i>
            </div>
        </footer>

    </main>

    <div id="photo-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            
            <button onclick="closeModal()" class="modal-close">
                <i data-lucide="x"></i>
            </button>
            
            <div class="modal-img-wrapper">
                <img id="modal-img" src="" alt="Foto Colaborador" class="modal-img" onerror="handleImageError(this)">
                
                <div id="img-error-msg" class="modal-error">
                    <i data-lucide="image-off"></i>
                    <h4>Foto não encontrada!</h4>
                    <p id="error-desc">
                        O sistema procurou o arquivo, mas não encontrou.
                    </p>
                </div>
            </div>
            
            <div class="modal-info-box">
                <div class="modal-name-row">
                    <i data-lucide="award"></i>
                    <h3 id="modal-name" class="modal-name">Nome</h3>
                    <i data-lucide="award"></i>
                </div>
                <p class="modal-subtitle">Bipagem (Criação de lote)</p>
            </div>
        </div>
    </div>

    <script>
        const configuracao = {
            pastaFotos: "fotos/", 
            colaboradores: [
                { nome: "Ismael Leite Benites",        arquivoFoto: "ismael.jpg" },
                { nome: "Samara Rodrigues da Silva",   arquivoFoto: "samara.jpg" },
                { nome: "Ryan Carlos Balbino de Pontes",arquivoFoto: "ryan.jpg" },
                { nome: "Kelly do Nascimento",         arquivoFoto: "kelly.jpeg" },
                { nome: "Rafael Silva",                arquivoFoto: "rafael.jpeg" },
                { nome: "Hellen Kauany Nascimento",    arquivoFoto: "hellen.jpeg" },
                { nome: "Vivian Pinheiro Nogueira",    arquivoFoto: "vivian.jpeg" },
                { nome: "Ana Beatriz dos Santos",      arquivoFoto: "1000071437.jpeg" }, 
                { nome: "Marilena da Silva",           arquivoFoto: "marilena.jpeg" },
                { nome: "Ana Karoline de França",      arquivoFoto: "ana_karoline.jpeg" }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid-colaboradores');
            let conteudoHTML = '';

            configuracao.colaboradores.forEach(colab => {
                const caminhoCompleto = configuracao.pastaFotos + colab.arquivoFoto;
                
                conteudoHTML += `
                <div onclick="openModal('${caminhoCompleto}', '${colab.nome}')" class="glass-card clickable-card">
                    <div class="avatar-icon-bg">
                       <i data-lucide="star" class="avatar-star"></i>
                    </div>
                    <div class="colab-info">
                        <h3 class="colab-name">${colab.nome}</h3>
                        <p class="colab-role">
                            <i data-lucide="barcode" class="icon-xs"></i> Bipagem <span class="opacity-60">(Criação de lote)</span>
                        </p>
                    </div>
                </div>
                `;
            });

            grid.innerHTML = conteudoHTML;
            lucide.createIcons();
        });

        function openModal(imageSrc, name) {
            const modal = document.getElementById('photo-modal');
            const imgEl = document.getElementById('modal-img');
            const nameEl = document.getElementById('modal-name');
            const errorMsg = document.getElementById('img-error-msg');
            const errorDesc = document.getElementById('error-desc');

            imgEl.style.display = 'block';
            errorMsg.classList.remove('is-active');

            imgEl.src = imageSrc;
            nameEl.textContent = name;
            
            errorDesc.innerHTML = `Tentamos abrir a imagem na pasta:<br> <strong>${imageSrc}</strong><br><br>Coloque a foto com este nome exato dentro da pasta "fotos".`;

            modal.classList.add('is-active');
        }

        function handleImageError(imgElement) {
            const errorMsg = document.getElementById('img-error-msg');
            imgElement.style.display = 'none';
            errorMsg.classList.add('is-active');
        }

        function closeModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('is-active');
            setTimeout(() => { document.getElementById('modal-img').src = ''; }, 300);
        }
        
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
