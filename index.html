<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1ª Olimpíada de Operações J&T - Galeria de Fotos</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para os ícones vetorizados -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fonte Google Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
        }
        
        .bg-jt-gradient {
            background: linear-gradient(135deg, #E3000F 0%, #a8000b 50%, #4a0004 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Efeito visual ao passar o mouse para indicar que o card tem foto */
        .clickable-card {
            cursor: pointer;
        }
        .clickable-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: #FDE047;
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.3);
        }

        .gold-text {
            background: linear-gradient(to right, #FDE047, #F59E0B, #FDE047);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: textShine 4s linear infinite;
        }

        .gold-button {
            background: linear-gradient(to right, #F59E0B, #FDE047, #F59E0B);
            background-size: 200% auto;
            animation: textShine 3s linear infinite;
            color: #450a0a;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
        }

        .trophy-glow {
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.6));
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .modal-enter {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <main class="bg-jt-gradient relative w-full max-w-[1280px] aspect-[16/9] max-h-[95vh] rounded-[2rem] shadow-[0_20px_50px_rgba(227,0,15,0.4)] overflow-hidden flex flex-col justify-between py-6 px-8 lg:px-12 border border-red-500/30">
        
        <!-- Luzes Decorativas -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div class="absolute -top-[20%] right-[10%] w-[50%] h-[60%] bg-white opacity-10 rounded-full blur-[100px]"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[60%] bg-black opacity-40 rounded-full blur-[100px]"></div>
        </div>

        <!-- Cabeçalho -->
        <header class="relative z-10 flex flex-col items-center w-full mb-4">
            <div class="flex items-center gap-2 bg-white text-[#E3000F] px-5 py-1.5 rounded-full font-bold shadow-lg mb-3 text-sm">
                <i data-lucide="package" class="w-4 h-4"></i>
                <span>J&T Express • Regional Sul</span>
            </div>

            <div class="flex items-center justify-center gap-6 w-full relative">
                <i data-lucide="sparkles" class="absolute top-1 left-[22%] w-6 h-6 text-yellow-300 opacity-80 hidden md:block"></i>
                <i data-lucide="trophy" class="w-12 h-12 lg:w-16 lg:h-16 text-yellow-400 trophy-glow fill-yellow-500/20"></i>
                
                <h1 class="text-3xl lg:text-5xl font-black text-center uppercase tracking-tighter leading-none text-white drop-shadow-xl">
                    1ª Olimpíada <br/> 
                    <span class="gold-text text-2xl lg:text-4xl mt-1 lg:mt-2 block">de Operações</span>
                </h1>
                
                <i data-lucide="trophy" class="w-12 h-12 lg:w-16 lg:h-16 text-yellow-400 trophy-glow fill-yellow-500/20"></i>
                <i data-lucide="sparkles" class="absolute bottom-1 right-[22%] w-5 h-5 text-yellow-300 opacity-80 hidden md:block"></i>
            </div>
            
            <p class="text-center text-base lg:text-lg font-medium mt-3 text-red-50">
                Apresentando os colaboradores classificados na <span class="text-yellow-400 font-bold border-b-2 border-yellow-400/50 pb-0.5">1ª fase</span>:
            </p>
        </header>

        <!-- Grid de Nomes (Será preenchido automaticamente pelo JavaScript no final do arquivo) -->
        <section id="grid-colaboradores" class="relative z-10 w-full grid grid-cols-2 gap-x-6 gap-y-2 lg:gap-y-3 flex-1 min-h-0 content-center">
            <!-- Os cards entrarão aqui -->
        </section>

        <!-- Rodapé -->
        <footer class="relative z-10 mt-4 mb-2 flex justify-center">
            <div class="gold-button font-black uppercase tracking-[0.2em] lg:tracking-[0.25em] py-3 px-8 lg:px-12 rounded-full text-sm lg:text-base flex items-center gap-3">
                <i data-lucide="award" class="w-4 h-4 lg:w-5 lg:h-5"></i>
                Competindo com excelência
                <i data-lucide="award" class="w-4 h-4 lg:w-5 lg:h-5"></i>
            </div>
        </footer>

    </main>

    <!-- Modal para exibir a foto -->
    <div id="photo-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeModal()">
        <div class="relative w-full max-w-sm lg:max-w-md bg-neutral-900 rounded-2xl p-3 shadow-2xl border border-red-500/50 modal-enter mx-4" onclick="event.stopPropagation()">
            
            <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-[#E3000F] text-white rounded-full p-2.5 hover:bg-red-700 hover:scale-110 transition-all shadow-lg z-20 border-2 border-neutral-900">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <div class="overflow-hidden rounded-xl bg-black flex flex-col items-center justify-center border border-neutral-700 relative min-h-[350px]">
                <img id="modal-img" src="" alt="Foto Colaborador" class="w-full h-auto object-cover max-h-[65vh] z-10" onerror="handleImageError(this)">
                
                <div id="img-error-msg" class="absolute inset-0 hidden flex-col items-center justify-center p-8 text-center z-0 bg-neutral-800">
                    <i data-lucide="image-off" class="w-12 h-12 text-yellow-500 mb-4 opacity-70"></i>
                    <h4 class="text-white font-bold mb-2 text-lg">Foto não encontrada!</h4>
                    <p class="text-sm text-neutral-300 leading-relaxed" id="error-desc">
                        O sistema procurou o arquivo, mas não encontrou.
                    </p>
                </div>
            </div>
            
            <div class="text-center mt-4 mb-2">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <i data-lucide="award" class="w-5 h-5 text-yellow-400"></i>
                    <h3 id="modal-name" class="text-white font-bold text-xl uppercase tracking-wider">Nome</h3>
                    <i data-lucide="award" class="w-5 h-5 text-yellow-400"></i>
                </div>
                <p class="text-red-300 text-sm font-medium">Bipagem (Criação de lote)</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE CONFIGURAÇÃO E FUNCIONAMENTO -->
    <script>
        // =========================================================================
        // 1. CONFIGURAÇÃO (EDITE AQUI PARA ADICIONAR AS FOTOS NA PASTA)
        // =========================================================================
        const configuracao = {
            // Nome da pasta onde as fotos devem ficar salvas no seu computador
            pastaFotos: "fotos/", 
            
            // Lista com o nome dos colaboradores e o arquivo da foto exato de cada um
            colaboradores: [
                { nome: "Ismael Leite Benites",         arquivoFoto: "ismael.jpg" },
                { nome: "Samara Rodrigues da Silva",    arquivoFoto: "samara.jpg" },
                { nome: "Ryan Carlos Balbino de Pontes",arquivoFoto: "ryan.jpg" },
                { nome: "Kelly do Nascimento",          arquivoFoto: "kelly.jpeg" },
                { nome: "Rafael Silva",                 arquivoFoto: "rafael.jpeg" },
                { nome: "Hellen Kauany Nascimento",     arquivoFoto: "hellen.jpeg" },
                { nome: "Vivian Pinheiro Nogueira",     arquivoFoto: "vivian.jpeg" },
                { nome: "Ana Beatriz dos Santos",       arquivoFoto: "1000071437.jpeg" }, 
                { nome: "Marilena da Silva",            arquivoFoto: "marilena.jpeg" },
                { nome: "Ana Karoline de França",       arquivoFoto: "ana_karoline.jpeg" }
            ]
        };

        // =========================================================================
        // 2. GERAÇÃO AUTOMÁTICA DO LAYOUT (NÃO PRECISA EDITAR)
        // =========================================================================
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid-colaboradores');
            let conteudoHTML = '';

            // O código passa por cada colaborador e cria o card com o layout restaurado
            configuracao.colaboradores.forEach(colab => {
                const caminhoCompleto = configuracao.pastaFotos + colab.arquivoFoto;
                
                conteudoHTML += `
                <div onclick="openModal('${caminhoCompleto}', '${colab.nome}')" class="glass-card clickable-card rounded-xl p-2.5 px-4 lg:p-3 lg:px-5 flex items-center gap-3 w-full group">
                    <div class="bg-gradient-to-br from-yellow-300 to-yellow-500 text-red-900 w-9 h-9 lg:w-10 lg:h-10 rounded-full flex items-center justify-center shrink-0 shadow-inner border border-yellow-200/50">
                       <i data-lucide="star" class="w-4 h-4 lg:w-5 lg:h-5 fill-red-900 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <div class="flex-1 truncate">
                        <h3 class="font-bold text-sm lg:text-[1.05rem] text-white leading-tight truncate">${colab.nome}</h3>
                        <p class="text-[0.7rem] lg:text-[0.8rem] text-red-200 mt-0.5 flex items-center gap-1.5 font-medium truncate">
                            <i data-lucide="barcode" class="w-3 h-3 opacity-70"></i> Bipagem <span class="opacity-60">(Criação de lote)</span>
                        </p>
                    </div>
                </div>
                `;
            });

            // Insere os cards na tela
            grid.innerHTML = conteudoHTML;
            
            // Inicializa os ícones
            lucide.createIcons();
        });

        // =========================================================================
        // 3. FUNÇÕES DO MODAL (FOTOS)
        // =========================================================================
        function openModal(imageSrc, name) {
            const modal = document.getElementById('photo-modal');
            const imgEl = document.getElementById('modal-img');
            const nameEl = document.getElementById('modal-name');
            const errorMsg = document.getElementById('img-error-msg');
            const errorDesc = document.getElementById('error-desc');

            imgEl.style.display = 'block';
            errorMsg.classList.remove('flex');
            errorMsg.classList.add('hidden');

            imgEl.src = imageSrc;
            nameEl.textContent = name;
            
            errorDesc.innerHTML = `Tentamos abrir a imagem na pasta:<br> <strong class="text-yellow-400 break-all">${imageSrc}</strong><br><br>Coloque a foto com este nome exato dentro da pasta "fotos".`;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function handleImageError(imgElement) {
            const errorMsg = document.getElementById('img-error-msg');
            imgElement.style.display = 'none';
            errorMsg.classList.remove('hidden');
            errorMsg.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            setTimeout(() => { document.getElementById('modal-img').src = ''; }, 300);
        }
        
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
